name: CI

on:
  push:
    branches: [master, main]
    tags: ['v*']
  pull_request:
    branches: [master, main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - run: go test ./...

  build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - name: Build static binary
        run: CGO_ENABLED=0 go build -ldflags "-X main.version=$(cat VERSION)" -o tmux-jump .
      - uses: actions/upload-artifact@v4
        with:
          name: tmux-jump-linux-amd64
          path: tmux-jump
          retention-days: 30

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: tmux-jump-linux-amd64
      - name: Rename for asset
        run: mv tmux-jump tmux-jump-linux-amd64
      - uses: softprops/action-gh-release@v2
        with:
          files: tmux-jump-linux-amd64
          generate_release_notes: true
